version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cityhall
      POSTGRES_PASSWORD: cityhall
      POSTGRES_DB: cityhall
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityhall -d cityhall"]
      interval: 5s
      timeout: 3s
      retries: 10

  cityhall:
    build:
      context: ./cityhall
    ports:
      - "8000:8000"
    environment:
      CITYHALL_PORT: "8000"
      DATABASE_URL: "postgresql+asyncpg://cityhall:cityhall@postgres:5432/cityhall"
      DIRECTOR_URL: "http://director:8400"
      INBOXER_URL: "http://inboxer:8300"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cityhall-data:/data

  director:
    build:
      context: ./director
    ports:
      - "8400:8400"
    environment:
      DIRECTOR_PORT: "8400"
      DIRECTOR_DATA_DIR: /data
    volumes:
      - director-data:/data
      - /var/run/docker.sock:/var/run/docker.sock

  picaso:
    build:
      context: ./picaso
    ports:
      - "8500:8500"
    environment:
      PICASO_PORT: "8500"
      PICASO_DATA_DIR: /data
      DIRECTOR_URL: http://director:8400
    depends_on:
      - director
    volumes:
      - picaso-data:/data

  historian:
    build:
      context: ./historian
    ports:
      - "8100:8100"
    environment:
      HISTORIAN_PORT: "8100"
      HISTORIAN_DATA_DIR: /data
    volumes:
      - historian-data:/data

  lawyer:
    build:
      context: ./lawyer
    ports:
      - "8200:8200"
    environment:
      LAWYER_PORT: "8200"
      HISTORIAN_URL: http://historian:8100
    depends_on:
      - historian

  inboxer:
    build:
      context: ./inboxer
    ports:
      - "8300:8300"
    environment:
      INBOXER_PORT: "8300"
      INBOXER_DATA_DIR: /data
    volumes:
      - inboxer-data:/data

  sp1d3r:
    build:
      context: ./sp1d3r
    ports:
      - "9000:9000"
    environment:
      SP1D3R_PORT: "9000"
      SP1D3R_HOST: "0.0.0.0"
      DIRECTOR_URL: http://director:8400
    depends_on:
      - director

  spiderwire:
    build:
      context: ./spiderwire
    ports:
      - "8600:8600"
    environment:
      SPIDERWIRE_PORT: "8600"
      DIRECTOR_URL: http://director:8400
    depends_on:
      - director

  banker:
    build:
      context: ./banker
    ports:
      - "8700:8700"
    environment:
      BANKER_PORT: "8700"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      FRONTEND_URL: "https://d31337m3.com"
      CITYHALL_URL: "http://host.docker.internal:8000"
      INBOXER_URL: "http://inboxer:8300"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - inboxer
    volumes:
      - banker-data:/data

volumes:
  postgres-data:
  cityhall-data:
  director-data:
  picaso-data:
  historian-data:
  inboxer-data:
  banker-data:
