version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cityhall
      POSTGRES_USER: cityhall
      POSTGRES_PASSWORD: cityhall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityhall"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      CITYHALL_DATABASE_URL: postgresql+asyncpg://cityhall:cityhall@db:5432/cityhall
      CITYHALL_JWT_SECRET_KEY: change-me-in-production
      CITYHALL_JWT_EXPIRE_MINUTES: "1440"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
